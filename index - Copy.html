<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VoucherPe | Coming Soon</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#f5f7fb,#eef2ff);

}

/* main card */

.container{

background:white;

padding:50px;

border-radius:18px;

text-align:center;

max-width:450px;

box-shadow:0 25px 60px rgba(0,0,0,0.1);

}

/* logo */

.logo{

font-size:36px;

font-weight:bold;

color:#3a6cff;

margin-bottom:5px;

}

/* title */

h1{

margin-top:10px;

font-size:32px;

}

/* subtitle */

p{

color:#666;

margin:15px 0 30px;

}

/* input */

.input-box{

display:flex;
justify-content:center;

}

input{

padding:14px;

border-radius:30px;

border:1px solid #ddd;

width:230px;

outline:none;

font-size:14px;

}

/* button */

button{

margin-left:10px;

padding:14px 22px;

border:none;

border-radius:30px;

background:#3a6cff;

color:white;

cursor:pointer;

font-weight:bold;

transition:0.3s;

}

button:hover{

background:#254edb;

transform:scale(1.05);

}

/* success message */

.msg{

margin-top:18px;

color:green;

font-size:14px;

}

</style>

</head>


<body>

<div class="container">

<div class="logo">VoucherPe</div>

<h1>Coming Soon</h1>

<p>India's next deals & voucher platform is launching soon.</p>

<div class="input-box">

<input id="email" type="email" placeholder="Enter your email">

<button onclick="sendEmail()">Notify Me</button>

</div>

<div class="msg" id="msg"></div>

</div>


<script>

function sendEmail(){

let email=document.getElementById("email").value;

if(email==""){

alert("Please enter email");

return;

}

fetch("https://script.google.com/macros/s/AKfycbz-7Tac4-0973zEVBLcvtVcrgdexhRwxhjtHy4hPn3Gk_W1flUsAJWyqCzC7_Uy-BzN/exec",{

method:"POST",

body:new URLSearchParams({

email:email

})

})

.then(res=>{

document.getElementById("msg").innerHTML="Thanks! We'll notify you when we launch.";

document.getElementById("email").value="";

})

}

</script>

</body>
</html>
